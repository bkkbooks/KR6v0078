body:
  text: 錄文二月一日童子下念定光如來佛八日太山下念藥師琉璃光佛十四日察命下念賢劫千佛十五日五道大將軍下念阿閦佛十八日閻羅王下念觀世音菩薩二十三日天大將軍下念盧舍那佛二十四日太山府君下念地藏菩薩二十八日天帝釋下念阿彌陀佛二十九日四天王下念藥王藥上菩薩三十日大梵王下念釋迦牟尼佛錄文完
